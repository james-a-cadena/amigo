services:
  # PostgreSQL 17 Database (shared between dev and prod)
  postgres:
    image: postgres:17-alpine
    container_name: amigo-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
      AUTHENTIK_DB_PASSWORD: ${AUTHENTIK_DB_PASSWORD:-authentik}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./docker/postgres/init-dev-db.sh:/docker-entrypoint-initdb.d/01-init-dev-db.sh:ro
      # Authentik DB init script - only needed if using bundled Authentik
      # Safe to leave mounted; it just creates an unused DB if Authentik isn't running
      - ./docker/postgres/init-authentik.sh:/docker-entrypoint-initdb.d/02-init-authentik.sh:ro
    # No ports exposed - only accessible via Docker network
    networks:
      - amigo-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Valkey 8 (Redis fork) for Sessions and Pub/Sub (shared)
  valkey:
    image: valkey/valkey:8-alpine
    container_name: amigo-valkey
    restart: unless-stopped
    volumes:
      - valkey_data:/data
    # No ports exposed - only accessible via Docker network
    networks:
      - amigo-network
    healthcheck:
      test: ["CMD", "valkey-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ============================================
  # AUTHENTIK (Identity Provider) - OPTIONAL
  # ============================================
  # Only starts with: docker compose --profile authentik up
  # Skip these if you have an existing Authentik/OIDC provider.
  # Just configure AUTHENTIK_ISSUER, AUTHENTIK_CLIENT_ID, and
  # AUTHENTIK_CLIENT_SECRET in your .env to point to your provider.

  authentik-server:
    profiles: [authentik]
    image: ghcr.io/goauthentik/server:2024.10
    container_name: amigo-authentik-server
    restart: unless-stopped
    command: server
    environment:
      AUTHENTIK_SECRET_KEY: ${AUTHENTIK_SECRET_KEY}
      AUTHENTIK_REDIS__HOST: valkey
      AUTHENTIK_POSTGRESQL__HOST: postgres
      AUTHENTIK_POSTGRESQL__USER: authentik
      AUTHENTIK_POSTGRESQL__NAME: authentik
      AUTHENTIK_POSTGRESQL__PASSWORD: ${AUTHENTIK_DB_PASSWORD:-authentik}
      AUTHENTIK_BOOTSTRAP_PASSWORD: ${AUTHENTIK_BOOTSTRAP_PASSWORD:-}
      AUTHENTIK_BOOTSTRAP_EMAIL: ${AUTHENTIK_BOOTSTRAP_EMAIL:-admin@example.com}
    volumes:
      - ./authentik/media:/media
      - ./authentik/custom-templates:/templates
    networks:
      - amigo-network
    depends_on:
      postgres:
        condition: service_healthy
      valkey:
        condition: service_healthy

  authentik-worker:
    profiles: [authentik]
    image: ghcr.io/goauthentik/server:2024.10
    container_name: amigo-authentik-worker
    restart: unless-stopped
    command: worker
    environment:
      AUTHENTIK_SECRET_KEY: ${AUTHENTIK_SECRET_KEY}
      AUTHENTIK_REDIS__HOST: valkey
      AUTHENTIK_POSTGRESQL__HOST: postgres
      AUTHENTIK_POSTGRESQL__USER: authentik
      AUTHENTIK_POSTGRESQL__NAME: authentik
      AUTHENTIK_POSTGRESQL__PASSWORD: ${AUTHENTIK_DB_PASSWORD:-authentik}
      # Bootstrap vars must be on worker - it runs the blueprints that create akadmin
      AUTHENTIK_BOOTSTRAP_PASSWORD: ${AUTHENTIK_BOOTSTRAP_PASSWORD:-}
      AUTHENTIK_BOOTSTRAP_EMAIL: ${AUTHENTIK_BOOTSTRAP_EMAIL:-admin@example.com}
    volumes:
      - ./authentik/media:/media
      - ./authentik/custom-templates:/templates
    networks:
      - amigo-network
    depends_on:
      postgres:
        condition: service_healthy
      valkey:
        condition: service_healthy

  # Caddy Reverse Proxy with DNS-01 SSL
  caddy:
    build:
      context: ./docker/caddy
      dockerfile: Dockerfile
    container_name: amigo-caddy
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    environment:
      CLOUDFLARE_API_TOKEN: ${CLOUDFLARE_API_TOKEN}
    volumes:
      - ./docker/caddy/Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    networks:
      - amigo-network
    depends_on:
      - web-prod
      - web-dev

  # ============================================
  # PRODUCTION STACK
  # ============================================

  web-prod:
    build:
      context: .
      dockerfile: ./apps/web/Dockerfile
      target: runner
    container_name: amigo-web-prod
    restart: unless-stopped
    environment:
      NODE_ENV: production
      DATABASE_URL: postgres://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}
      VALKEY_URL: redis://valkey:6379
      AUTHENTIK_ISSUER: ${AUTHENTIK_ISSUER}
      AUTHENTIK_CLIENT_ID: ${AUTHENTIK_CLIENT_ID}
      AUTHENTIK_CLIENT_SECRET: ${AUTHENTIK_CLIENT_SECRET}
      APP_URL: ${APP_URL}
      NEXT_PUBLIC_VAPID_PUBLIC_KEY: ${NEXT_PUBLIC_VAPID_PUBLIC_KEY}
      VAPID_PRIVATE_KEY: ${VAPID_PRIVATE_KEY}
      VAPID_SUBJECT: ${VAPID_SUBJECT}
    networks:
      - amigo-network
    depends_on:
      postgres:
        condition: service_healthy
      valkey:
        condition: service_healthy

  api-prod:
    build:
      context: .
      dockerfile: ./apps/api/Dockerfile
    container_name: amigo-api-prod
    restart: unless-stopped
    environment:
      NODE_ENV: production
      DATABASE_URL: postgres://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}
      VALKEY_URL: redis://valkey:6379
    networks:
      - amigo-network
    depends_on:
      postgres:
        condition: service_healthy
      valkey:
        condition: service_healthy

  # ============================================
  # DEVELOPMENT STACK
  # ============================================

  # Production-like dev build (no hot reload, for testing prod builds)
  web-dev:
    build:
      context: .
      dockerfile: ./apps/web/Dockerfile
      target: runner
    container_name: amigo-web-dev
    restart: unless-stopped
    environment:
      NODE_ENV: production
      PORT: 3001
      DATABASE_URL: postgres://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}_dev
      VALKEY_URL: redis://valkey:6379
      AUTHENTIK_ISSUER: ${AUTHENTIK_ISSUER}
      AUTHENTIK_CLIENT_ID: ${AUTHENTIK_CLIENT_ID}
      AUTHENTIK_CLIENT_SECRET: ${AUTHENTIK_CLIENT_SECRET}
      APP_URL: ${DEV_APP_URL:-${APP_URL}}
      NEXT_PUBLIC_VAPID_PUBLIC_KEY: ${NEXT_PUBLIC_VAPID_PUBLIC_KEY}
      VAPID_PRIVATE_KEY: ${VAPID_PRIVATE_KEY}
      VAPID_SUBJECT: ${VAPID_SUBJECT}
    networks:
      - amigo-network
    depends_on:
      postgres:
        condition: service_healthy
      valkey:
        condition: service_healthy

  # Hot-reload dev server (for active development)
  web-dev-hot:
    build:
      context: .
      dockerfile: ./apps/web/Dockerfile.dev
    container_name: amigo-web-dev-hot
    restart: unless-stopped
    environment:
      NODE_ENV: development
      PORT: 3001
      TZ: ${TZ:-America/Toronto}
      DATABASE_URL: postgres://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}_dev
      VALKEY_URL: redis://valkey:6379
      AUTHENTIK_ISSUER: ${AUTHENTIK_ISSUER}
      AUTHENTIK_CLIENT_ID: ${AUTHENTIK_CLIENT_ID}
      AUTHENTIK_CLIENT_SECRET: ${AUTHENTIK_CLIENT_SECRET}
      APP_URL: ${DEV_APP_URL:-${APP_URL}}
      WATCHPACK_POLLING: "true"
      NEXT_PUBLIC_VAPID_PUBLIC_KEY: ${NEXT_PUBLIC_VAPID_PUBLIC_KEY}
      VAPID_PRIVATE_KEY: ${VAPID_PRIVATE_KEY}
      VAPID_SUBJECT: ${VAPID_SUBJECT}
    networks:
      - amigo-network
    volumes:
      # Mount only the source directory for hot reload
      - ./apps/web/src:/app/apps/web/src
      - ./apps/web/public:/app/apps/web/public
    depends_on:
      postgres:
        condition: service_healthy
      valkey:
        condition: service_healthy

  api-dev:
    build:
      context: .
      dockerfile: ./apps/api/Dockerfile
    container_name: amigo-api-dev
    restart: unless-stopped
    environment:
      NODE_ENV: production
      DATABASE_URL: postgres://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}_dev
      VALKEY_URL: redis://valkey:6379
    networks:
      - amigo-network
    depends_on:
      postgres:
        condition: service_healthy
      valkey:
        condition: service_healthy

networks:
  amigo-network:
    driver: bridge

volumes:
  postgres_data:
  valkey_data:
  caddy_data:
  caddy_config:
