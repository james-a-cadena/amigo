services:
  # PostgreSQL 17 Database (shared between dev and prod)
  postgres:
    image: postgres:17-alpine
    container_name: amigo-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./docker/postgres/init-dev-db.sh:/docker-entrypoint-initdb.d/01-init-dev-db.sh:ro
    # No ports exposed - only accessible via Docker network
    networks:
      - caddy-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Valkey 8 (Redis fork) for Sessions and Pub/Sub (shared)
  valkey:
    image: valkey/valkey:8-alpine
    container_name: amigo-valkey
    restart: unless-stopped
    volumes:
      - valkey_data:/data
    # No ports exposed - only accessible via Docker network
    networks:
      - caddy-network
    healthcheck:
      test: ["CMD", "valkey-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ============================================
  # PRODUCTION STACK
  # ============================================

  web-prod:
    build:
      context: .
      dockerfile: ./apps/web/Dockerfile
      target: runner
    container_name: amigo-web-prod
    restart: unless-stopped
    environment:
      NODE_ENV: production
      DATABASE_URL: postgres://${POSTGRES_USER}:${POSTGRES_PASSWORD}@amigo-postgres:5432/${POSTGRES_DB}
      VALKEY_URL: redis://amigo-valkey:6379
      AUTHENTIK_ISSUER: ${AUTHENTIK_ISSUER}
      AUTHENTIK_CLIENT_ID: ${AUTHENTIK_CLIENT_ID}
      AUTHENTIK_CLIENT_SECRET: ${AUTHENTIK_CLIENT_SECRET}
      APP_URL: ${APP_URL}
      NEXT_PUBLIC_VAPID_PUBLIC_KEY: ${NEXT_PUBLIC_VAPID_PUBLIC_KEY}
      VAPID_PRIVATE_KEY: ${VAPID_PRIVATE_KEY}
      VAPID_SUBJECT: ${VAPID_SUBJECT}
    networks:
      - caddy-network
    depends_on:
      postgres:
        condition: service_healthy
      valkey:
        condition: service_healthy

  api-prod:
    build:
      context: .
      dockerfile: ./apps/api/Dockerfile
    container_name: amigo-api-prod
    restart: unless-stopped
    environment:
      NODE_ENV: production
      DATABASE_URL: postgres://${POSTGRES_USER}:${POSTGRES_PASSWORD}@amigo-postgres:5432/${POSTGRES_DB}
      VALKEY_URL: redis://amigo-valkey:6379
    networks:
      - caddy-network
    depends_on:
      postgres:
        condition: service_healthy
      valkey:
        condition: service_healthy

  # ============================================
  # DEVELOPMENT STACK
  # ============================================

  # Production-like dev build (no hot reload, for testing prod builds)
  web-dev:
    build:
      context: .
      dockerfile: ./apps/web/Dockerfile
      target: runner
    container_name: amigo-web-dev
    restart: unless-stopped
    environment:
      NODE_ENV: production
      PORT: 3001
      DATABASE_URL: postgres://${POSTGRES_USER}:${POSTGRES_PASSWORD}@amigo-postgres:5432/${POSTGRES_DB}_dev
      VALKEY_URL: redis://amigo-valkey:6379
      AUTHENTIK_ISSUER: ${AUTHENTIK_ISSUER}
      AUTHENTIK_CLIENT_ID: ${AUTHENTIK_CLIENT_ID}
      AUTHENTIK_CLIENT_SECRET: ${AUTHENTIK_CLIENT_SECRET}
      APP_URL: ${DEV_APP_URL:-${APP_URL}}
      NEXT_PUBLIC_VAPID_PUBLIC_KEY: ${NEXT_PUBLIC_VAPID_PUBLIC_KEY}
      VAPID_PRIVATE_KEY: ${VAPID_PRIVATE_KEY}
      VAPID_SUBJECT: ${VAPID_SUBJECT}
    networks:
      - caddy-network
    depends_on:
      postgres:
        condition: service_healthy
      valkey:
        condition: service_healthy

  # Hot-reload dev server (for active development)
  web-dev-hot:
    build:
      context: .
      dockerfile: ./apps/web/Dockerfile.dev
    container_name: amigo-web-dev-hot
    restart: unless-stopped
    environment:
      NODE_ENV: development
      PORT: 3001
      TZ: ${TZ:-America/Toronto}
      DATABASE_URL: postgres://${POSTGRES_USER}:${POSTGRES_PASSWORD}@amigo-postgres:5432/${POSTGRES_DB}_dev
      VALKEY_URL: redis://amigo-valkey:6379
      AUTHENTIK_ISSUER: ${AUTHENTIK_ISSUER}
      AUTHENTIK_CLIENT_ID: ${AUTHENTIK_CLIENT_ID}
      AUTHENTIK_CLIENT_SECRET: ${AUTHENTIK_CLIENT_SECRET}
      APP_URL: ${DEV_APP_URL:-${APP_URL}}
      WATCHPACK_POLLING: "true"
      NEXT_PUBLIC_VAPID_PUBLIC_KEY: ${NEXT_PUBLIC_VAPID_PUBLIC_KEY}
      VAPID_PRIVATE_KEY: ${VAPID_PRIVATE_KEY}
      VAPID_SUBJECT: ${VAPID_SUBJECT}
    networks:
      - caddy-network
    volumes:
      # Mount only the source directory for hot reload
      - ./apps/web/src:/app/apps/web/src
      - ./apps/web/public:/app/apps/web/public
    depends_on:
      postgres:
        condition: service_healthy
      valkey:
        condition: service_healthy

  api-dev:
    build:
      context: .
      dockerfile: ./apps/api/Dockerfile
    container_name: amigo-api-dev
    restart: unless-stopped
    environment:
      NODE_ENV: production
      DATABASE_URL: postgres://${POSTGRES_USER}:${POSTGRES_PASSWORD}@amigo-postgres:5432/${POSTGRES_DB}_dev
      VALKEY_URL: redis://amigo-valkey:6379
    networks:
      - caddy-network
    depends_on:
      postgres:
        condition: service_healthy
      valkey:
        condition: service_healthy

networks:
  # External network shared with standalone Caddy
  caddy-network:
    external: true

volumes:
  postgres_data:
  valkey_data:
