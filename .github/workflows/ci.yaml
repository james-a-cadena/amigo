name: CI

on:
  push:
    branches: [master, dev]
  pull_request:
    branches: [master, dev]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  typecheck:
    name: Typecheck
    runs-on: self-hosted
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install dependencies
        run: ~/.bun/bin/bun install --frozen-lockfile

      - name: Run typecheck
        run: ~/.bun/bin/bun run typecheck

  lint:
    name: Lint
    runs-on: self-hosted
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install dependencies
        run: ~/.bun/bin/bun install --frozen-lockfile

      - name: Run lint
        run: ~/.bun/bin/bun run lint
        continue-on-error: true # Lint not fully configured yet

  build:
    name: Build
    runs-on: self-hosted
    needs: [typecheck]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install dependencies
        run: ~/.bun/bin/bun install --frozen-lockfile

      - name: Build packages
        run: ~/.bun/bin/bun run build
        env:
          DATABASE_URL: postgres://test:test@localhost:5432/test

  docker:
    name: Docker Build
    runs-on: self-hosted
    needs: [typecheck]
    strategy:
      matrix:
        app: [web, api]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build ${{ matrix.app }}
        run: docker build -f ./apps/${{ matrix.app }}/Dockerfile -t amigo-${{ matrix.app }}:test .
